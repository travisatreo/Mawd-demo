// Helper: format text with **bold** markers
function FormatText(props) {
  var parts = props.text.split(/(\*\*[^*]+\*\*)/g);
  return e("span", null, parts.map(function(part, i) {
    if (part.indexOf("**") === 0 && part.lastIndexOf("**") === part.length - 2) {
      return e("strong", { key: i, style: { color: BRAND.primaryLight } }, part.slice(2, -2));
    }
    return e("span", { key: i }, part);
  }));
}

// Mobile detection hook
function useIsMobile() {
  var state = useState(typeof window !== "undefined" ? window.innerWidth < 768 : false);
  var isMobile = state[0];
  var setIsMobile = state[1];
  useEffect(function() {
    function handleResize() { setIsMobile(window.innerWidth < 768); }
    window.addEventListener("resize", handleResize);
    return function() { window.removeEventListener("resize", handleResize); };
  }, []);
  return isMobile;
}

// Donut chart with SVG
function DonutChart(props) {
  var total = 0;
  props.data.forEach(function(d) { total += d.value; });
  var cumulative = 0;
  var radius = 70;
  var cx = 90;
  var cy = 90;
  var innerRadius = 45;

  function polarToCartesian(cx, cy, r, angle) {
    var rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function arcPath(cx, cy, r1, r2, startAngle, endAngle) {
    var s1 = polarToCartesian(cx, cy, r2, startAngle);
    var e1 = polarToCartesian(cx, cy, r2, endAngle);
    var s2 = polarToCartesian(cx, cy, r1, endAngle);
    var e2 = polarToCartesian(cx, cy, r1, startAngle);
    var large = endAngle - startAngle > 180 ? 1 : 0;
    return "M " + s1.x + " " + s1.y + " A " + r2 + " " + r2 + " 0 " + large + " 1 " + e1.x + " " + e1.y + " L " + s2.x + " " + s2.y + " A " + r1 + " " + r1 + " 0 " + large + " 0 " + e2.x + " " + e2.y + " Z";
  }

  var paths = [];
  props.data.forEach(function(d, i) {
    var startAngle = (cumulative / total) * 360;
    cumulative += d.value;
    var endAngle = (cumulative / total) * 360;
    if (endAngle - startAngle > 0.5) {
      paths.push(e("path", { key: i, d: arcPath(cx, cy, innerRadius, radius, startAngle, endAngle - 1), fill: d.color, opacity: 0.85 }));
    }
  });

  // On mobile: stack SVG above legend vertically
  return e("div", { style: { display: "flex", flexDirection: props.isMobile ? "column" : "row", alignItems: "center", gap: props.isMobile ? 16 : 20 } },
    e("svg", { width: 180, height: 180, viewBox: "0 0 180 180", style: { flexShrink: 0 } },
      paths,
      e("text", { x: cx, y: cy - 6, textAnchor: "middle", fill: "#fff", fontSize: 16, fontWeight: 700 }, "$141K"),
      e("text", { x: cx, y: cy + 10, textAnchor: "middle", fill: BRAND.textDim, fontSize: 9 }, "Ingrooves gross"),
      e("text", { x: cx, y: cy + 22, textAnchor: "middle", fill: BRAND.textDark, fontSize: 8 }, "(by platform)")
    ),
    e("div", { style: { display: "flex", flexDirection: props.isMobile ? "row" : "column", flexWrap: props.isMobile ? "wrap" : "nowrap", gap: props.isMobile ? 8 : 4, justifyContent: props.isMobile ? "center" : "flex-start" } },
      props.data.map(function(d, i) {
        return e("div", { key: i, style: { display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: BRAND.textMuted } },
          e("div", { style: { width: 8, height: 8, borderRadius: 2, background: d.color, flexShrink: 0 } }),
          d.name,
          e("span", { style: { color: BRAND.textDark, marginLeft: 4 } }, d.pct + "%")
        );
      })
    )
  );
}

              e("div", { style: { maxWidth: isUser ? (isMobile ? "85%" : 400) : (isMobile ? "100%" : 640), padding: isMobile ? "12px 16px" : "14px 20px", borderRadius: isUser ? "20px 20px 4px 20px" : "20px 20px 20px 4px", background: isUser ? "linear-gradient(135deg, " + BRAND.primary + ", " + BRAND.gradient2 + ")" : "linear-gradient(135deg, " + BRAND.bgCard + " 0%, " + BRAND.bgCardAlt + " 100%)", color: isUser ? "#fff" : BRAND.text, fontSize: isMobile ? 13 : 14, lineHeight: 1.7, fontWeight: isUser ? 600 : 400, border: !isUser ? "1px solid " + BRAND.border : "none", whiteSpace: "pre-line" } },
                !isUser ? e("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 10 } },
                  e("div", { style: { width: 20, height: 20, borderRadius: 5, background: "linear-gradient(135deg, " + BRAND.gradient1 + ", " + BRAND.gradient2 + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#fff" } }, "M"),
                  e("span", { style: { color: BRAND.primaryLight, fontSize: 11, fontWeight: 600, letterSpacing: 1 } }, "MAWD")
                ) : null,
                e(FormatText, { text: msg.text })
              )
            );
          })
        ),
        // Typing indicator with agent activity inline
        isTyping ? e("div", { style: { padding: isMobile ? "0 16px" : "0 40px" } },
          e("div", { style: { display: "flex", justifyContent: "flex-start", marginBottom: 20 } },
            e("div", { style: { padding: "14px 24px", borderRadius: "20px 20px 20px 4px", background: "linear-gradient(135deg, " + BRAND.bgCard + " 0%, " + BRAND.bgCardAlt + " 100%)", border: "1px solid " + BRAND.border, display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" } },
              e("div", { style: { width: 20, height: 20, borderRadius: 5, background: "linear-gradient(135deg, " + BRAND.gradient1 + ", " + BRAND.gradient2 + ")", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 800, color: "#fff" } }, "M"),
              e("div", { style: { display: "flex", gap: 4 } },
                [0, 1, 2].map(function(i) {
                  return e("div", { key: i, style: { width: 6, height: 6, borderRadius: 3, background: BRAND.primaryLight, animation: "pulse 1.2s ease-in-out " + (i * 0.2) + "s infinite", opacity: 0.4 } });
                })
              ),
              e("span", { style: { color: BRAND.textDim, fontSize: 12 } },
                agentActive ? "Consulting " + AGENTS.find(function(a) { return a.id === agentActive; }).name + "..." : "Consulting agents..."
              )
            )
          )
        ) : null,
        e("div", { ref: chatEndRef })
      ),
      // Input
      e("form", { style: { padding: isMobile ? "12px 16px 16px" : "16px 40px 24px", borderTop: "1px solid " + BRAND.border }, onSubmit: function(ev) { ev.preventDefault(); handleChatSubmit(); } },
        e("div", { style: { display: "flex", alignItems: "center", gap: isMobile ? 8 : 12, padding: "6px 6px 6px 16px", borderRadius: 16, background: "rgba(14,14,42,0.8)", border: "1px solid " + (chatInput ? BRAND.borderActive : BRAND.border), transition: "border-color 0.2s" } },
          e("input", { type: "text", value: chatInput, onChange: function(ev) { setChatInput(ev.target.value); }, placeholder: isMobile ? "Ask MAWD anything..." : "Ask MAWD anything about your business...", style: { background: "transparent", border: "none", outline: "none", color: BRAND.text, fontSize: isMobile ? 14 : 14, flex: 1, fontFamily: "inherit" } }),
          e("button", { type: "submit", style: { width: 32, height: 32, borderRadius: 8, background: chatInput ? "linear-gradient(135deg, " + BRAND.primary + ", " + BRAND.gradient2 + ")" : "rgba(255,255,255,0.05)", display: "flex", alignItems: "center", justifyContent: "center", color: chatInput ? "#fff" : BRAND.textDark, fontWeight: 700, fontSize: 14, border: "none", cursor: chatInput ? "pointer" : "default", transition: "all 0.2s" } }, "\u2191")
        )
      )
    )
  );

  var views = { dashboard: dashboard, agents: agentsView, chat: chatView };

  return e("div", { style: { minHeight: "100vh", background: BRAND.bg, color: BRAND.text, fontFamily: "'Inter', system-ui, -apple-system, sans-serif", position: "relative", overflow: "hidden", paddingBottom: isMobile ? 56 : 0 } },
    e("div", { style: { position: "fixed", top: -300, right: -200, width: 700, height: 700, background: "radial-gradient(circle, rgba(74,74,230,0.07) 0%, transparent 70%)", pointerEvents: "none" } }),
    e("div", { style: { position: "fixed", bottom: -300, left: -200, width: 600, height: 600, background: "radial-gradient(circle, rgba(123,92,246,0.05) 0%, transparent 70%)", pointerEvents: "none" } }),
    header,
    views[activeView],
    bottomTabBar
  );
}

ReactDOM.render(e(MAWDDemo), document.getElementById("root"));
</script>
