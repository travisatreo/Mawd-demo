function useIsMobile() {
  var state = useState(typeof window !== "undefined" ? window.innerWidth < 768 : false);
  useEffect(function() {
    function h() { state[1](window.innerWidth < 768); }
    window.addEventListener("resize", h);
    return function() { window.removeEventListener("resize", h); };
  }, []);
  return state[0];
}

// IntersectionObserver hook for scroll-triggered animations
function useInView(ref, opts) {
  var state = useState(false);
  useEffect(function() {
    if (!ref.current || !window.IntersectionObserver) { state[1](true); return; }
    // Check if already in viewport on mount (fixes elements visible on initial render)
    var rect = ref.current.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) { state[1](true); return; }
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) { if (entry.isIntersecting) { state[1](true); observer.unobserve(entry.target); } });
    }, opts || { threshold: 0.1 });
    observer.observe(ref.current);
    return function() { observer.disconnect(); };
  }, []);
  return state[0];
}

// ScrollReveal wrapper component
function ScrollReveal(props) {
  var ref = useRef(null);
  var isVisible = useInView(ref, { threshold: 0.1 });
  var delay = props.delay || 0;
  return e("div", {
    ref: ref,
    style: Object.assign({
      opacity: isVisible ? 1 : 0,
      transform: isVisible ? "translateY(0)" : "translateY(20px)",
      transition: "opacity 0.5s ease-out " + delay + "ms, transform 0.5s ease-out " + delay + "ms"
    }, props.style || {})
  }, props.children);
}

// Mini sparkline SVG
function Sparkline(props) {
  var data = props.data;
  var max = Math.max.apply(null, data);
  var min = Math.min.apply(null, data);
  var range = max - min || 1;
  var w = 140, h = 36;
  var points = data.map(function(v, i) {
    return (i / (data.length - 1)) * w + "," + (h - ((v - min) / range) * (h - 4) - 2);
  }).join(" ");
  return e("div", { className: "card-reveal", style: { background: "rgba(255,255,255,0.03)", borderRadius: 10, padding: "10px 14px", border: "1px solid " + BRAND.border } },
    e("div", { style: { fontSize: 10, color: BRAND.textDim, marginBottom: 6 } }, props.label),
    e("svg", { width: w, height: h, viewBox: "0 0 " + w + " " + h },
      e("polyline", { points: points, fill: "none", stroke: props.color || BRAND.primaryLight, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" })
    )
  );
}

function DonutChart(props) {
  var total = 0;
  props.data.forEach(function(d) { total += d.value; });
  var cumulative = 0, radius = 70, cx = 90, cy = 90, innerRadius = 45;
  function ptc(cx2, cy2, r, a) { var rad = (a - 90) * Math.PI / 180; return { x: cx2 + r * Math.cos(rad), y: cy2 + r * Math.sin(rad) }; }

    return "M "+s1.x+" "+s1.y+" A "+r2+" "+r2+" 0 "+lg+" 1 "+e1.x+" "+e1.y+" L "+s2.x+" "+s2.y+" A "+r1+" "+r1+" 0 "+lg+" 0 "+e2.x+" "+e2.y+" Z";
  }
