// Helper: format text with **bold** markers
function FormatText(props) {
  var parts = props.text.split(/(\*\*[^*]+\*\*)/g);
  return e("span", null, parts.map(function(part, i) {
    if (part.indexOf("**") === 0 && part.lastIndexOf("**") === part.length - 2) {
      return e("strong", { key: i, style: { color: BRAND.primaryLight } }, part.slice(2, -2));
    }
    return e("span", { key: i }, part);
  }));
}

// Donut chart with SVG
function DonutChart(props) {
  var total = 0;
  props.data.forEach(function(d) { total += d.value; });
  var cumulative = 0;
  var radius = 70;
  var cx = 90;
  var cy = 90;
  var innerRadius = 45;

  function polarToCartesian(cx, cy, r, angle) {
    var rad = (angle - 90) * Math.PI / 180;
    return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
  }

  function arcPath(cx, cy, r1, r2, startAngle, endAngle) {
    var s1 = polarToCartesian(cx, cy, r2, startAngle);
    var e1 = polarToCartesian(cx, cy, r2, endAngle);
    var s2 = polarToCartesian(cx, cy, r1, endAngle);
    var e2 = polarToCartesian(cx, cy, r1, startAngle);
    var large = endAngle - startAngle > 180 ? 1 : 0;
    return "M " + s1.x + " " + s1.y + " A " + r2 + " " + r2 + " 0 " + large + " 1 " + e1.x + " " + e1.y + " L " + s2.x + " " + s2.y + " A " + r1 + " " + r1 + " 0 " + large + " 0 " + e2.x + " " + e2.y + " Z";
  }

  var paths = [];
  props.data.forEach(function(d, i) {
    var startAngle = (cumulative / total) * 360;
    cumulative += d.value;
    var endAngle = (cumulative / total) * 360;
    if (endAngle - startAngle > 0.5) {
      paths.push(e("path", { key: i, d: arcPath(cx, cy, innerRadius, radius, startAngle, endAngle - 1), fill: d.color, opacity: 0.85 }));
    }
  });

  return e("div", { style: { display: "flex", alignItems: "center", gap: 20 } },
    e("svg", { width: 180, height: 180, viewBox: "0 0 180 180" },
      paths,
      e("text", { x: cx, y: cy - 6, textAnchor: "middle", fill: "#fff", fontSize: 18, fontWeight: 700 }, "$141K"),
      e("text", { x: cx, y: cy + 12, textAnchor: "middle", fill: BRAND.textDim, fontSize: 10 }, "total gross")
    ),
    e("div", { style: { display: "flex", flexDirection: "column", gap: 4 } },
      props.data.map(function(d, i) {
        return e("div", { key: i, style: { display: "flex", alignItems: "center", gap: 6, fontSize: 11, color: BRAND.textMuted } },
          e("div", { style: { width: 8, height: 8, borderRadius: 2, background: d.color, flexShrink: 0 } }),
          d.name,
          e("span", { style: { color: BRAND.textDark, marginLeft: 4 } }, d.pct + "%")
        );
      })
    )
  );
}
